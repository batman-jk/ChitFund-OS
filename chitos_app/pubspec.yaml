name: chitos_app
description: Chit Fund Management Platform

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase — database + auth
  supabase_flutter: ^2.3.0

  # HTTP calls to your Express backend
  dio: ^5.4.0

  # Local storage — cache groups/members offline
  hive_flutter: ^1.1.0

  # State management — simple and clean
  provider: ^6.1.1

  # Push notifications (FCM)
  firebase_messaging: ^14.7.10
  flutter_local_notifications: ^16.3.0

  # Navigation
  go_router: ^13.0.0

  # UI helpers
  google_fonts: ^6.1.0    # Noto Sans for Telugu support
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0          # Loading skeleton effect

  # Phone number input
  intl_phone_field: ^3.2.0

  # Telugu / multilingual text
  flutter_localizations:
    sdk: flutter
  intl: ^0.19.0

  # WhatsApp deep link (open WhatsApp from app)
  url_launcher: ^6.2.4

  # Shared preferences — store language choice, auth token
  shared_preferences: ^2.2.2

  # OTP input field
  pin_code_fields: ^8.0.1

  # Charts for reports screen
  fl_chart: ^0.66.2

  # PDF generation — passbook download
  pdf: ^3.10.7
  printing: ^5.12.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  hive_generator: ^2.0.1
  build_runner: ^2.4.8
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
